<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshCart – Your Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="fc-nav">
  <div class="nav-brand">
    <img src="static/logo.png" class="nav-logo-img" onclick="location.href='home.html'" style="cursor:pointer">
    <span class="brand-name" onclick="location.href='home.html'" style="cursor:pointer">FreshCart</span>
  </div>
  <div class="nav-actions">
    <button class="fc-btn fc-btn-ghost" onclick="location.href='home.html'">← Continue Shopping</button>
  </div>
</nav>

<div class="fc-container" style="max-width:700px">
  <div class="section-header" style="margin-top:32px">
    <div class="section-icon">🛒</div>
    <div>
      <h2 class="section-title">Your Cart</h2>
      <p class="section-sub">Review before placing order</p>
    </div>
  </div>
  <div id="cartBox"></div>
  <div class="cart-summary" id="cartSummary" style="display:none">
    <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
    <div class="summary-row"><span>Delivery fee</span><span class="text-success">FREE</span></div>
    <div class="summary-row total-row"><span>Total</span><span id="total">₹0</span></div>
    <button class="fc-btn fc-btn-add" style="width:100%;padding:15px;font-size:1rem;margin-top:12px" onclick="placeOrder()">Place Order 🎉</button>
  </div>
</div>
<div id="toast" class="fc-toast"></div>
<script src="app.js"></script>
</body>
</html>
