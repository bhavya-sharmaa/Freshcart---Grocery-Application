<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshCart – Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#1a7a4a;
  --green-mid:#2ecc71;
  --green-light:#d6f5e3;
  --accent:#f4c430;
  --text:#1a1a2e;
  --muted:#6b7280;
}
body{
  font-family:'DM Sans',sans-serif;
  background:#f0fdf4;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}
/* Animated blobs */
.blob{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.35;
  animation:drift 12s ease-in-out infinite alternate;
  pointer-events:none;
}
.blob1{width:500px;height:500px;background:#a8e063;top:-100px;left:-150px;animation-delay:0s;}
.blob2{width:400px;height:400px;background:#56ab2f;bottom:-100px;right:-100px;animation-delay:-4s;}
.blob3{width:300px;height:300px;background:#f4c430;top:50%;left:60%;animation-delay:-8s;}
@keyframes drift{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(30px,40px) scale(1.1);}
}
nav{
  display:flex;
  align-items:center;
  gap:10px;
  padding:18px 32px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.5);
  position:relative;
  z-index:10;
}
nav .brand{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  color:var(--green);
}
.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  position:relative;
  z-index:5;
}
.login-card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:28px;
  padding:48px 40px;
  width:100%;
  max-width:420px;
  box-shadow:0 24px 64px rgba(26,122,74,0.12);
  animation:slideUp 0.5s ease both;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
.login-card .logo-ring{
  width:80px;height:80px;
  background:linear-gradient(135deg,var(--green),var(--green-mid));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  font-size:2rem;
  box-shadow:0 8px 24px rgba(46,204,113,0.35);
}
.login-card h2{
  font-family:'Playfair Display',serif;
  font-size:1.7rem;
  color:var(--text);
  text-align:center;
  margin-bottom:6px;
}
.login-card .sub{
  text-align:center;
  color:var(--muted);
  font-size:0.9rem;
  margin-bottom:28px;
}
.fc-input{
  width:100%;
  padding:13px 18px;
  border:1.5px solid #e0e0e0;
  border-radius:14px;
  font-family:'DM Sans',sans-serif;
  font-size:0.95rem;
  background:rgba(255,255,255,0.9);
  outline:none;
  transition:border 0.2s,box-shadow 0.2s;
  margin-bottom:14px;
  display:block;
}
.fc-input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(46,204,113,0.15);
}
textarea.fc-input{resize:none;height:90px;}
.btn-go{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--green),var(--green-mid));
  color:white;
  border:none;
  border-radius:14px;
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.15s,box-shadow 0.2s;
  margin-top:6px;
  box-shadow:0 6px 18px rgba(46,204,113,0.35);
}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(46,204,113,0.4);}
.btn-go:active{transform:translateY(0);}
footer{
  text-align:center;
  padding:14px;
  font-size:0.8rem;
  color:var(--muted);
  position:relative;z-index:5;
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<nav>
  <img src="static/logo.png" style="width:38px;height:38px;object-fit:contain;border-radius:8px;">
  <span class="brand">FreshCart</span>
</nav>
<div class="hero">
  <div class="login-card">
    <div class="logo-ring" style="background:none;box-shadow:none;padding:0;">
      <img src="static/logo.png" style="width:80px;height:80px;object-fit:contain;border-radius:16px;">
    </div>
    <h2>Welcome!</h2>
    <p class="sub">Fresh groceries, delivered fast</p>
    <input class="fc-input" placeholder="Your name" type="text">
    <input class="fc-input" placeholder="Phone number" type="tel">
    <textarea class="fc-input" placeholder="Delivery address"></textarea>
    <button class="btn-go" onclick="location.href='home.html'">Continue to Shop →</button>
  </div>
</div>
<footer>© FreshCart 2026 · Fresh everyday</footer>
</body>
</html>
